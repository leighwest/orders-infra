<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cupcake Shop — We're Closed</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fdf0e8;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      img {
        max-width: 80%;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      }
    </style>
  </head>
  <body>
    <img
      src="closed.webp"
      alt="The cupcake shop is closed. We open again at 7am."
    />
  </body>
</html>
