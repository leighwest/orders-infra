name: Terraform

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-4

      - name: Package Lambda functions
        run: |
          zip -j ec2_stop.zip scripts/ec2_stop.py
          zip -j dispatch_lambda.zip dispatch_lambda/index.mjs
          aws s3 cp ec2_stop.zip s3://orders-lambda-artifacts/ec2_stop/${{ github.sha }}.zip
          aws s3 cp dispatch_lambda.zip s3://orders-lambda-artifacts/dispatch/${{ github.sha }}.zip

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform plan
        run: terraform plan -var="PERSONAL_IP_ADDRESS=${{ secrets.PERSONAL_IP_ADDRESS }}" -var="GIT_SHA=${{ github.sha }}"

      - name: Terraform apply
        run: terraform apply -auto-approve -var="PERSONAL_IP_ADDRESS=${{ secrets.PERSONAL_IP_ADDRESS }}" -var="GIT_SHA=${{ github.sha }}"
